<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0a0e13"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="#1e2530" stroke-width="1"/>
  <!-- relay glyph: leftward harpoon over rightward harpoon (⇋) -->
  <g stroke="#6ea8fe" stroke-width="4.5" stroke-linecap="round" fill="none">
    <!-- top arrow: right → left -->
    <path d="M 46 22 L 18 22"/>
    <path d="M 22 17 L 18 22"/>
    <!-- bottom arrow: left → right -->
    <path d="M 18 42 L 46 42"/>
    <path d="M 42 47 L 46 42"/>
  </g>
</svg>
