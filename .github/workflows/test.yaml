name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      checks: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          # global.json pins the SDK exactly; we just need the binaries on PATH.
          global-json-file: global.json

      - name: Restore
        run: dotnet restore InotifyRelay.slnx

      - name: Build
        run: dotnet build InotifyRelay.slnx --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test InotifyRelay.slnx \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults
          retention-days: 14

      - name: Surface test result summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: dotnet tests (${{ matrix.os }})
          path: TestResults/**/test-results.trx
          reporter: dotnet-trx
          fail-on-error: false
